<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>Awards</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: { "primary": "#ea2a33", "background-light": "#f8f6f6", "background-dark": "#211111" },
          fontFamily: { "display": ["Spline Sans"] },
        },
      },
    }
  </script>
  <style>
      body { height: 100dvh; overflow: hidden; }
      [x-cloak] { display: none !important; }
      .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  </style>
  <!-- Alpine chargé avec defer -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="config.js"></script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-white" x-data="awardsPage">

<div class="flex flex-col h-screen">
  <!-- Header -->
  <header class="flex-shrink-0 flex items-center p-4 pb-2 justify-between sticky top-0 bg-background-light dark:bg-background-dark z-10">
    <button onclick="history.back()" class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center"><span class="material-symbols-outlined">arrow_back</span></button>
    <h2 class="text-lg font-bold leading-tight flex-1 text-center">Awards</h2>
    <div class="size-12"></div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto scroll-smooth px-4 pb-20 relative">

    <!-- Loading State -->
    <div x-show="loading" class="flex justify-center items-center py-10" x-cloak>
      <span class="material-symbols-outlined animate-spin text-primary text-3xl">progress_activity</span>
    </div>

    <!-- Lists -->
    <div x-show="!loading" x-cloak>
      <!-- Tabs -->
      <div class="relative flex p-1 bg-gray-200 dark:bg-gray-800 rounded-xl mt-4 mb-6">
        <div class="absolute inset-y-1 bg-white dark:bg-gray-700 rounded-lg shadow-sm transition-all duration-300 w-[calc(33.333%-5px)]"
             :class="{
               'left-1': currentTab === 'films',
               'left-[33.333%] ml-[2.5px]': currentTab === 'series',
               'left-[66.666%] ml-[4px]': currentTab === 'acteurs'
             }">
        </div>
        <button @click="currentTab = 'films'" class="relative z-10 flex-1 py-2 text-sm font-medium transition-colors duration-300" :class="currentTab === 'films' ? 'text-gray-900 dark:text-white' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'">Films</button>
        <button @click="currentTab = 'series'" class="relative z-10 flex-1 py-2 text-sm font-medium transition-colors duration-300" :class="currentTab === 'series' ? 'text-gray-900 dark:text-white' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'">Séries</button>
        <button @click="currentTab = 'acteurs'" class="relative z-10 flex-1 py-2 text-sm font-medium transition-colors duration-300" :class="currentTab === 'acteurs' ? 'text-gray-900 dark:text-white' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'">Acteurs</button>
      </div>

      <!-- Films Section -->
      <div x-show="currentTab === 'films'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" class="flex flex-col gap-3">
        <template x-for="item in movies" :key="item.id">
          <div @click="openEditModal(item)" class="bg-white dark:bg-gray-800 rounded-xl p-4 flex justify-between items-center shadow-sm cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-750 border border-gray-100 dark:border-gray-800 transition">
            <div class="flex flex-col">
              <span class="font-bold text-gray-900 dark:text-white" x-text="item.title"></span>
              <span class="text-sm text-gray-500" x-text="item.year"></span>
            </div>
            <div class="flex gap-4 text-sm font-medium">
              <div class="flex items-center gap-1 text-yellow-500"><span class="material-symbols-outlined filled text-lg">trophy</span> <span x-text="item.wins"></span></div>
              <div class="flex items-center gap-1 text-gray-400"><span class="material-symbols-outlined text-lg">stars</span> <span x-text="item.nominations"></span></div>
            </div>
          </div>
        </template>
        <div x-show="movies.length === 0" class="text-gray-500 text-sm py-2">Aucun film enregistré.</div>
      </div>

      <!-- Series Section -->
      <div x-show="currentTab === 'series'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" class="flex flex-col gap-3" x-cloak>
        <template x-for="item in series" :key="item.id">
          <div @click="openEditModal(item)" class="bg-white dark:bg-gray-800 rounded-xl p-4 flex justify-between items-center shadow-sm cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-750 border border-gray-100 dark:border-gray-800 transition">
            <div class="flex flex-col">
              <span class="font-bold text-gray-900 dark:text-white" x-text="item.title"></span>
              <span class="text-sm text-gray-500" x-text="item.year"></span>
            </div>
            <div class="flex gap-4 text-sm font-medium">
              <div class="flex items-center gap-1 text-yellow-500"><span class="material-symbols-outlined filled text-lg">trophy</span> <span x-text="item.wins"></span></div>
              <div class="flex items-center gap-1 text-gray-400"><span class="material-symbols-outlined text-lg">stars</span> <span x-text="item.nominations"></span></div>
            </div>
          </div>
        </template>
        <div x-show="series.length === 0" class="text-gray-500 text-sm py-2">Aucune série enregistrée.</div>
      </div>

      <!-- Actors Section -->
      <div x-show="currentTab === 'acteurs'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" class="flex flex-col gap-3" x-cloak>
        <template x-for="item in actors" :key="item.id">
          <div @click="openEditModal(item)" class="bg-white dark:bg-gray-800 rounded-xl p-4 flex justify-between items-center shadow-sm cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-750 border border-gray-100 dark:border-gray-800 transition">
            <div class="flex flex-col">
              <span class="font-bold text-gray-900 dark:text-white" x-text="item.title"></span>
              <span class="text-sm text-gray-500" x-text="item.year ? item.year : ''"></span>
            </div>
            <div class="flex gap-4 text-sm font-medium">
              <div class="flex items-center gap-1 text-yellow-500"><span class="material-symbols-outlined filled text-lg">trophy</span> <span x-text="item.wins"></span></div>
              <div class="flex items-center gap-1 text-gray-400"><span class="material-symbols-outlined text-lg">stars</span> <span x-text="item.nominations"></span></div>
            </div>
          </div>
        </template>
        <div x-show="actors.length === 0" class="text-gray-500 text-sm py-2">Aucun acteur enregistré.</div>
      </div>
    </div>
  </main>

  <!-- Edit/Add Modal -->
  <div x-show="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" x-cloak x-transition.opacity>
    <div @click.away="closeModal" class="bg-white dark:bg-[#1a1a1a] w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden p-6 relative">
      <button @click="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-white"><span class="material-symbols-outlined">close</span></button>

      <div class="flex items-center gap-2 mb-1">
        <h3 class="text-xl font-bold text-gray-900 dark:text-white" x-text="selectedItem ? selectedItem.title : ''"></h3>
        <a x-show="selectedItem && selectedItem.id && selectedItem.id !== 'new'"
           :href="editData.type === 'movie' || editData.type === 'film' ? 'film.html?id=' + selectedItem.id : (editData.type === 'tv' || editData.type === 'serie' ? 'serie.html?id=' + selectedItem.id : 'person.html?id=' + selectedItem.id)"
           class="text-primary hover:text-red-400 transition"
           title="Voir la fiche détaillée">
          <span class="material-symbols-outlined text-lg">open_in_new</span>
        </a>
      </div>
      <p class="text-sm text-gray-500 mb-6" x-text="selectedItem ? selectedItem.year : ''"></p>

      <!-- TMDB Search Field -->
      <div class="mb-6 relative">
        <label class="block text-sm font-medium text-gray-400 mb-1">Rechercher et lier un(e) <span x-text="editData.type === 'movie' || editData.type === 'film' ? 'Film' : (editData.type === 'tv' || editData.type === 'serie' ? 'Série' : 'Acteur')"></span></label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">search</span>
          <input type="text" x-model="searchQuery" @input.debounce.500ms="fetchSearchResults" placeholder="Titre..." class="w-full pl-10 pr-4 py-2 bg-gray-100 dark:bg-gray-800 border-0 rounded-xl focus:ring-1 focus:ring-primary text-gray-900 dark:text-white text-sm placeholder-gray-500">
          <div x-show="isSearching" class="absolute right-3 top-1/2 -translate-y-1/2">
            <span class="material-symbols-outlined animate-spin text-primary text-sm">progress_activity</span>
          </div>
        </div>

        <!-- Search Results Dropdown -->
        <div x-show="searchResults.length > 0" @click.away="searchResults = []" class="absolute z-50 w-full mt-1 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-100 dark:border-gray-700 overflow-hidden max-h-48 overflow-y-auto" x-transition x-cloak>
          <template x-for="result in searchResults" :key="result.id">
            <div @click="selectSearchResult(result)" class="p-3 hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer border-b border-gray-100 dark:border-gray-700 last:border-0 flex items-center gap-3">
              <img :src="result.poster_path ? 'https://image.tmdb.org/t/p/w92' + result.poster_path : (result.profile_path ? 'https://image.tmdb.org/t/p/w45' + result.profile_path : 'https://placehold.co/40x60')" class="w-10 h-14 object-cover rounded bg-gray-200 dark:bg-gray-900">
              <div class="flex-1 min-w-0">
                <div class="text-sm font-bold text-gray-900 dark:text-white truncate" x-text="result.title || result.name"></div>
                <div class="text-xs text-gray-500" x-text="result.release_date ? result.release_date.substring(0,4) : (result.first_air_date ? result.first_air_date.substring(0,4) : '')"></div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">Nominations</label>
          <div class="flex items-center">
            <button @click="editData.nominations = Math.max(0, editData.nominations - 1)" class="bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white w-10 h-10 rounded-l-lg flex items-center justify-center hover:bg-gray-300 dark:hover:bg-gray-600 transition"><span class="material-symbols-outlined">remove</span></button>
            <input type="number" x-model.number="editData.nominations" class="w-full h-10 text-center bg-gray-100 dark:bg-gray-800 border-0 focus:ring-0 text-gray-900 dark:text-white font-bold" min="0">
            <button @click="editData.nominations++" class="bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white w-10 h-10 rounded-r-lg flex items-center justify-center hover:bg-gray-300 dark:hover:bg-gray-600 transition"><span class="material-symbols-outlined">add</span></button>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">Victoires (Wins)</label>
          <div class="flex items-center">
            <button @click="editData.wins = Math.max(0, editData.wins - 1)" class="bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white w-10 h-10 rounded-l-lg flex items-center justify-center hover:bg-gray-300 dark:hover:bg-gray-600 transition"><span class="material-symbols-outlined">remove</span></button>
            <input type="number" x-model.number="editData.wins" class="w-full h-10 text-center bg-gray-100 dark:bg-gray-800 border-0 focus:ring-0 text-gray-900 dark:text-white font-bold" min="0">
            <button @click="editData.wins++" class="bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white w-10 h-10 rounded-r-lg flex items-center justify-center hover:bg-gray-300 dark:hover:bg-gray-600 transition"><span class="material-symbols-outlined">add</span></button>
          </div>
        </div>
      </div>

      <div class="mt-8 flex gap-3">
        <button @click="closeModal" class="flex-1 py-3 text-sm font-medium text-gray-600 dark:text-gray-300 bg-gray-200 dark:bg-gray-800 rounded-xl hover:bg-gray-300 dark:hover:bg-gray-700 transition">Annuler</button>
        <button @click="saveAward" class="flex-1 py-3 text-sm font-bold text-white bg-primary rounded-xl hover:bg-red-600 transition" x-text="saving ? '...' : 'Enregistrer'" :disabled="saving"></button>
      </div>
    </div>
  </div>

</div>

<!-- Script NORMAL (sans type="module") pour s'assurer que ça se lance avant qu'Alpine ait fini -->
<script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('awardsPage', () => ({
      currentTab: 'films',
      awards: {},
      movies: [],
      series: [],
      actors: [],
      loading: true,

      showModal: false,
      selectedItem: null,
      editData: { nominations: 0, wins: 0, type: 'movie' },
      saving: false,
      
      searchQuery: '',
      searchResults: [],
      isSearching: false,

      // On stockera les outils Firebase ici une fois chargés
      db: null,
      fbCollection: null,
      fbGetDocs: null,
      fbDoc: null,
      fbSetDoc: null,

      async init() {
        try {
          // 1. Importation dynamique (évite les conflits de timing avec Alpine)
          const firebaseModule = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");
          const configModule = await import("./firebase-config.js");
          
          this.db = firebaseModule.getFirestore(configModule.app);
          this.fbCollection = firebaseModule.collection;
          this.fbGetDocs = firebaseModule.getDocs;
          this.fbDoc = firebaseModule.doc;
          this.fbSetDoc = firebaseModule.setDoc;

          // 2. Maintenant qu'on a Firebase, on charge les données
          await this.loadAwards();
        } catch (error) {
          console.error("Erreur critique lors de l'initialisation de Firebase ou du chargement:", error);
          this.loading = false;
        }
      },

      async loadAwards() {
        this.loading = true;
        try {
          const awardsCollection = this.fbCollection(this.db, "awards");
          const querySnapshot = await this.fbGetDocs(awardsCollection);
          
          const loadedAwards = {};
          querySnapshot.forEach((document) => {
            const data = document.data();
            const id = data.tmdb_id || document.id; 
            loadedAwards[id] = data;
          });
          
          this.awards = loadedAwards;
          this.sortAndFilterAwards();
        } catch (error) {
          console.error("Erreur pendant le chargement des awards:", error);
        }
        this.loading = false;
      },

      sortAndFilterAwards() {
        const list = Object.entries(this.awards).map(([id, data]) => ({
          id: id,
          title: data.nom_oeuvre || data.title || 'Inconnu',
          year: data.annee || data.year || null,
          nominations: data.nominations || 0,
          wins: data.victoires || data.wins || 0,
          type: data.type || 'movie',
          tmdb_id: data.tmdb_id || id
        }));

        list.sort((a, b) => {
          const yearA = a.year || 0;
          const yearB = b.year || 0;
          if (yearB !== yearA) return yearB - yearA;
          return a.title.localeCompare(b.title);
        });

        this.movies = list.filter(item => item.type === 'film' || item.type === 'movie');
        this.series = list.filter(item => item.type === 'serie' || item.type === 'tv');
        this.actors = list.filter(item => item.type === 'acteur' || item.type === 'person');
      },

      openEditModal(awardItem) {
        this.selectedItem = { ...awardItem, original_id: awardItem.id };
        this.editData = {
          nominations: awardItem.nominations || 0,
          wins: awardItem.wins || 0,
          type: awardItem.type
        };
        this.showModal = true;
      },

      closeModal() {
        this.showModal = false;
        setTimeout(() => {
          this.selectedItem = null;
          this.editData = { nominations: 0, wins: 0, type: 'movie' };
          this.searchQuery = '';
          this.searchResults = [];
        }, 300);
      },

      async fetchSearchResults() {
        if (this.searchQuery.length <= 2) {
          this.searchResults = [];
          return;
        }

        this.isSearching = true;
        try {
          const type = this.editData.type;
          let searchType = 'movie';
          if (type === 'serie' || type === 'tv') searchType = 'tv';
          if (type === 'acteur' || type === 'person') searchType = 'person';

          const url = `https://api.themoviedb.org/3/search/${searchType}?api_key=${TMDB_API_KEY}&language=fr-FR&query=${encodeURIComponent(this.searchQuery)}&include_adult=false`;

          const response = await fetch(url);
          if (!response.ok) throw new Error("TMDB Search Error");

          const data = await response.json();
          this.searchResults = data.results.slice(0, 5); // Limit to 5 results
        } catch (error) {
          console.error("Search error:", error);
        } finally {
          this.isSearching = false;
        }
      },

      selectSearchResult(result) {
        let typeMap = this.editData.type;
        if (typeMap === 'movie') typeMap = 'film';
        if (typeMap === 'tv') typeMap = 'serie';
        if (typeMap === 'person') typeMap = 'acteur';

        // Update selected item info
        const title = result.title || result.name;
        let year = null;
        if (result.release_date) year = result.release_date.split('-')[0];
        if (result.first_air_date) year = result.first_air_date.split('-')[0];

        this.selectedItem = {
          ...this.selectedItem,
          id: result.id,
          title: title,
          year: year
        };

        // We update editData as well in case type needs synchronization,
        // but here we just need to update ID and reset search
        this.searchQuery = '';
        this.searchResults = [];
      },

      async saveAward() {
        if (!this.selectedItem) return;
        this.saving = true;

        const id = String(this.selectedItem.id); // Ensure string ID for map

        let typeMap = this.editData.type;
        if (typeMap === 'movie') typeMap = 'film';
        if (typeMap === 'tv') typeMap = 'serie';
        if (typeMap === 'person') typeMap = 'acteur';

        const newData = {
          nom_oeuvre: this.selectedItem.title,
          annee: this.selectedItem.year || 0,
          type: typeMap,
          nominations: parseInt(this.editData.nominations) || 0,
          victoires: parseInt(this.editData.wins) || 0,
          tmdb_id: id
        };

        try {
          // Keep existing document data if it's there
          const existingData = this.awards[id] || {};
          const mergedData = { ...existingData, ...newData };

          const docRef = this.fbDoc(this.db, "awards", id);
          await this.fbSetDoc(docRef, newData, { merge: true }); // Need to send newData

          // Important: If we changed the ID via search, we must delete the old record
          // to prevent duplicates and orphaned data.
          if (this.selectedItem.original_id && String(this.selectedItem.original_id) !== id) {
            const oldId = String(this.selectedItem.original_id);
            try {
              // import deleteDoc dynamically here if not done in init, or use generic logic.
              // Instead of importing, we can just delete from memory and rely on SetDoc.
              // To cleanly delete from Firebase we need deleteDoc.
              const firebaseModule = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");
              await firebaseModule.deleteDoc(this.fbDoc(this.db, "awards", oldId));
              delete this.awards[oldId];
            } catch (e) {
              console.error("Error deleting old record", e);
            }
          }

          // Update memory with merged data
          this.awards[id] = mergedData;
          this.sortAndFilterAwards();
          this.closeModal();
        } catch (error) {
          console.error("Error saving award:", error);
          alert("Erreur lors de la sauvegarde.");
        } finally {
          this.saving = false;
        }
      }
    }));
  });
</script>
</body>
</html>
