<div x-show="showCountryModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" x-cloak x-transition.opacity>
    <div @click.away="showCountryModal = false" class="bg-white dark:bg-[#1a1a1a] w-full max-w-xs rounded-2xl shadow-2xl overflow-hidden p-4">
        <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4 text-center">Choisir le pays</h3>
        <div class="space-y-2">
            <button @click="setCountry('FR')" class="flex items-center w-full p-3 rounded-xl border transition-all" :class="country === 'FR' ? 'border-primary bg-primary/10' : 'border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800'"><img src="https://flagcdn.com/w40/fr.png" class="w-8 rounded shadow-sm mr-3"><span class="flex-1 text-left font-medium text-gray-900 dark:text-white">France</span><span x-show="country === 'FR'" class="material-symbols-outlined text-primary">check_circle</span></button>
            <button @click="setCountry('IE')" class="flex items-center w-full p-3 rounded-xl border transition-all" :class="country === 'IE' ? 'border-primary bg-primary/10' : 'border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800'"><img src="https://flagcdn.com/w40/ie.png" class="w-8 rounded shadow-sm mr-3"><span class="flex-1 text-left font-medium text-gray-900 dark:text-white">Irlande</span><span x-show="country === 'IE'" class="material-symbols-outlined text-primary">check_circle</span></button>
        </div>
        <button @click="showCountryModal = false" class="mt-4 w-full py-3 text-sm font-medium text-gray-500 hover:text-gray-900 dark:hover:text-gray-300">Annuler</button>
    </div>
</div>

<script src="js/utils.js"></script>
<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('userProfile', () => ({
            showCountryModal: false,
            country: localStorage.getItem('userRegion') || 'FR',
            get countryName() { return this.country === 'FR' ? 'France' : 'Irlande'; },
            get platformCount() { return getSafeLocalStorage('selectedPlatforms', []).length; },
            get actorCount() { return getSafeLocalStorage('favoriteActors', []).length; },
            setCountry(code) { this.country = code; localStorage.setItem('userRegion', code); this.showCountryModal = false; },
            
            // Fonction Vider le Cache
            async clearCache() {
                if (!confirm("Voulez-vous vraiment vider le cache ? Vos listes seront conservées, mais l'application devra re-télécharger les affiches et détails des films.")) return;

                const keysToKeep = [
                    'watchlist', 'watchedMovies', 'watchedSeries', 'watchedEpisodes', 
                    'favoriteActors', 'selectedPlatforms', 'userRegion', 'userId', 'previousSearches'
                ];
                
                const keysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (!keysToKeep.includes(key)) {
                        keysToRemove.push(key);
                    }
                }
                keysToRemove.forEach(k => localStorage.removeItem(k));

                if ('caches' in window) {
                    try {
                        const cacheNames = await caches.keys();
                        await Promise.all(cacheNames.map(name => caches.delete(name)));
                    } catch(e) {
                        console.error("Erreur lors du nettoyage du cache API", e);
                    }
                }

                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                    }
                }

                alert("Cache vidé avec succès ! L'application va redémarrer.");
                window.location.reload(true); 
            }
        }));
    });

    if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js')); }

    // Scripts pour l'Export/Import
    function exportData() {
        const data = {
            watchlist: localStorage.getItem('watchlist'),
            watchedMovies: localStorage.getItem('watchedMovies'),
            watchedSeries: localStorage.getItem('watchedSeries'),
            watchedEpisodes: localStorage.getItem('watchedEpisodes'),
            favoriteActors: localStorage.getItem('favoriteActors'),
            selectedPlatforms: localStorage.getItem('selectedPlatforms')
        };
        const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `CineMatch_Sauvegarde_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if(data.watchlist) localStorage.setItem('watchlist', data.watchlist);
                if(data.watchedMovies) localStorage.setItem('watchedMovies', data.watchedMovies);
                if(data.watchedSeries) localStorage.setItem('watchedSeries', data.watchedSeries);
                if(data.watchedEpisodes) localStorage.setItem('watchedEpisodes', data.watchedEpisodes);
                if(data.favoriteActors) localStorage.setItem('favoriteActors', data.favoriteActors);
                if(data.selectedPlatforms) localStorage.setItem('selectedPlatforms', data.selectedPlatforms);
                alert('🎉 Tes données ont été restaurées avec succès !');
                window.location.reload();
            } catch(err) {
                alert('❌ Erreur : Fichier de sauvegarde invalide ou corrompu.');
                console.error(err);
            }
        };
        reader.readAsText(file);
    }
</script>
</body>
